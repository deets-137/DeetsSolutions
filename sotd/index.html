<!doctype html>
<html lang="en" data-theme="fairy" data-skin="cyberstorm">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOTD — Deets</title>
    <link rel="icon" href="../assets/favicon.png" type="image/png" />
    <!-- sotd-og:begin (generated by scripts/build-sotd-og.py - do not edit by hand) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Deets.Solutions" />
    <meta property="og:title" content="SOTD — Deets" />
    <meta property="og:description" content="Song of the Day journal. Latest: Memories — Thutmose (Jul 22)." />
    <meta property="og:url" content="https://deets.solutions/sotd/" />
    <meta property="og:image" content="https://deets.solutions/sotd/og.jpg?v=20260722-5900" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />
    <meta property="og:image:alt" content="Album art for Memories by Thutmose, with the Deets and Happy pixel sprites" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#382732" />
    <!-- sotd-og:end -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("deets-theme");
          if (!t) {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "moonlight" : "fairy";
          }
          document.documentElement.setAttribute("data-theme", t);
          var s = localStorage.getItem("deets-skin");
          if (!s) {
            s = window.matchMedia("(max-width: 41rem)").matches
              ? "ocean" : "cyberstorm";
          }
          document.documentElement.setAttribute("data-skin", s);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../styles/main.css" />
    <script src="../js/controls.js" defer></script>
    <script src="../js/toast.js" defer></script>
    <script src="./sotd.js" defer></script>
    <script src="../js/walkers.js" defer></script>
  </head>

  <body>
    <header class="site-header">
      <div class="site-brand">
        <a class="wordmark" href="/">Deets</a>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <div class="nav-group">
          <button type="button" class="nav-group__label" aria-haspopup="true">Blog<span class="nav-group__caret" aria-hidden="true">&#9662;</span></button>
          <div class="nav-group__menu" role="menu">
            <a href="/sotd/" role="menuitem" aria-current="page" data-nav-core>SOTD</a>
            <a href="/movies/" role="menuitem">Movies</a>
          </div>
        </div>
        <div class="nav-group">
          <button type="button" class="nav-group__label" aria-haspopup="true">Games<span class="nav-group__caret" aria-hidden="true">&#9662;</span></button>
          <div class="nav-group__menu" role="menu">
            <a href="/cities/" role="menuitem">DeetsCities</a>
            <a href="/mahjong/" role="menuitem">DeetsMahjong</a>
          </div>
        </div>
        <div class="nav-group">
          <button type="button" class="nav-group__label" aria-haspopup="true">Utilities<span class="nav-group__caret" aria-hidden="true">&#9662;</span></button>
          <div class="nav-group__menu" role="menu">
            <a href="/radio/" role="menuitem">DeetsRadio</a>
            <a href="/league/" role="menuitem">League</a>
          </div>
        </div>
        <div class="nav-group">
          <button type="button" class="nav-group__label" aria-haspopup="true">About Me<span class="nav-group__caret" aria-hidden="true">&#9662;</span></button>
          <div class="nav-group__menu" role="menu">
            <a href="/cool-stuff/" role="menuitem" data-nav-core>Cool Stuff I Did</a>
            <a href="/resume/" role="menuitem">Resume</a>
          </div>
        </div>
      </nav>
      <span class="settings" data-settings></span>
    </header>

    <main class="site-main">
      <!-- Song of the Day — a journal pulled from Discord by DeetsOTD.
           sotd.js fetches songs.json and renders the grid below. -->
      <section class="sotd">
        <div class="sotd__bar">
          <h1 class="sotd__title">Song of the Day</h1>
          <div class="sotd-toolbar" data-sotd-toolbar aria-label="Sort and view"></div>
        </div>
        <p class="sotd__meta" data-sotd-meta></p>
        <div class="sotd__grid" data-sotd-grid aria-live="polite"></div>
      </section>
    </main>
  </body>
</html>
