<!doctype html>
<html lang="en" data-theme="fairy" data-skin="cyberstorm">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOTD — Deets</title>
    <link rel="icon" href="../assets/favicon.png" type="image/png" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("deets-theme");
          if (!t) {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "moonlight" : "fairy";
          }
          document.documentElement.setAttribute("data-theme", t);
          var s = localStorage.getItem("deets-skin");
          if (!s) {
            s = window.matchMedia("(max-width: 41rem)").matches
              ? "ocean" : "cyberstorm";
          }
          document.documentElement.setAttribute("data-skin", s);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../styles/main.css" />
    <script src="../js/controls.js" defer></script>
    <script src="./sotd.js" defer></script>
  </head>

  <body>
    <header class="site-header">
      <div class="site-brand">
        <a class="wordmark" href="/">Deets</a>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <a href="/sotd/" aria-current="page">SOTD</a>
        <a href="/movies/">Movies</a>
        <a href="/cool-stuff/">Cool Stuff I Did</a>
        <a href="/resume/">Resume</a>
      </nav>
      <span class="settings" data-settings></span>
    </header>

    <main class="site-main">
      <!-- Song of the Day — a journal pulled from Discord by DeetsOTD.
           sotd.js fetches songs.json and renders the grid below. -->
      <section class="sotd">
        <div class="sotd__bar">
          <h1 class="sotd__title">Song of the Day</h1>
          <div class="sotd-toolbar" data-sotd-toolbar aria-label="Sort and view"></div>
        </div>
        <p class="sotd__meta" data-sotd-meta></p>
        <div class="sotd__grid" data-sotd-grid aria-live="polite"></div>
      </section>
    </main>
  </body>
</html>
