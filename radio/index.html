<!doctype html>
<html lang="en" data-theme="fairy" data-skin="cyberstorm">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeetsRadio — Deets</title>
    <link rel="icon" href="../assets/favicon.png" type="image/png" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("deets-theme");
          if (!t) {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "moonlight" : "fairy";
          }
          document.documentElement.setAttribute("data-theme", t);
          var s = localStorage.getItem("deets-skin");
          if (!s) {
            s = window.matchMedia("(max-width: 41rem)").matches
              ? "ocean" : "cyberstorm";
          }
          document.documentElement.setAttribute("data-skin", s);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../styles/main.css" />
    <!-- MusicKit JS from Apple's CDN — the documented exception to the
         site's no-CDN rule, this page only (docs/radio.md, "Limits & costs") -->
    <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" async></script>
    <script src="../js/controls.js" defer></script>
    <script src="../js/toast.js" defer></script>
    <script src="./strings.js" defer></script>
    <script src="./dev-token.js" defer></script>
    <script src="./transport-mock.js" defer></script>
    <script src="./transport.js" defer></script>
    <script src="./apple.js" defer></script>
    <script src="./yt-key.js" defer></script>
    <script src="./youtube.js" defer></script>
    <script src="./radio.js" defer></script>
    <script src="../js/walkers.js" defer></script>
  </head>

  <body>
    <header class="site-header">
      <div class="site-brand">
        <a class="wordmark" href="/">Deets</a>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <a href="/sotd/">SOTD</a>
        <a href="/movies/">Movies</a>
        <a href="/radio/" aria-current="page">DeetsRadio</a>
        <a href="/league/">League</a>
        <a href="/cool-stuff/">Cool Stuff I Did</a>
        <a href="/resume/">Resume</a>
      </nav>
      <span class="settings" data-settings></span>
    </header>

    <main class="site-main">
      <!-- DeetsRadio — shared listening rooms (docs/radio.md). Phase 3:
           rooms live on the real transport (transport.js → the ../DeetsRadio
           worker at radio-api.deets.solutions, a Durable Object per room);
           ?mock selects the in-page fake instead. The Apple side is real
           (apple.js + dev-token.js): search, auth, and playback. All copy
           comes from strings.js. Like League, the bar carries a combo box
           where the journals put an <h1>: the station code IS the title. -->
      <section class="sotd radio">
        <div class="sotd__bar">
          <div class="tb-ctrl radio-who">
            <!-- aria-label comes from strings.js (radio.js boot) -->
            <input class="radio-who__input" data-radio-who type="text"
                   autocomplete="off" spellcheck="false" />
            <div class="tb-pop radio-who__pop" data-radio-who-pop hidden></div>
          </div>
          <div class="sotd-toolbar" data-radio-toolbar aria-label="Station controls"></div>
        </div>
        <p class="sotd__meta" data-radio-meta aria-live="polite"></p>

        <!-- pre-join gate: peek result → join / start-this-station -->
        <div class="radio-gate" data-radio-gate hidden></div>

        <!-- in-room -->
        <div class="radio-room" data-radio-room hidden>
          <div class="radio-np" data-radio-np></div>
          <div class="radio-tabs" data-radio-tabs aria-label="Column"></div>
          <div class="radio-columns" data-radio-columns data-active="queue">
            <section class="radio-col" data-col="search">
              <h2 class="radio-col__title" data-radio-title-search></h2>
              <div class="radio-col__body" data-radio-search></div>
            </section>
            <section class="radio-col" data-col="queue">
              <h2 class="radio-col__title" data-radio-title-queue></h2>
              <div class="radio-col__body" data-radio-queue></div>
            </section>
            <section class="radio-col" data-col="history">
              <h2 class="radio-col__title" data-radio-title-history></h2>
              <div class="radio-col__body" data-radio-history></div>
            </section>
          </div>
          <!-- crew panel: always-up listener roster under the columns.
               Everyone reads it; the owner gets R|E capability pills
               (queue / player), the kick x, and the room-mode dropdown
               (docs/radio.md, "Listener identity & queue permissions") -->
          <div class="radio-service">
            <div class="radio-crew" data-radio-crew hidden></div>
            <!-- the match desk: the room's songs on the left, the video
                 workbench on the right — paste a YouTube link to fix the
                 attached video (docs/youtube.md, "The match desk") -->
            <div class="radio-desk" data-radio-desk hidden></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
