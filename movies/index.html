<!doctype html>
<html lang="en" data-theme="fairy" data-skin="cyberstorm">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies — Deets</title>
    <link rel="icon" href="../assets/favicon.png" type="image/png" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("deets-theme");
          if (!t) {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "moonlight" : "fairy";
          }
          document.documentElement.setAttribute("data-theme", t);
          var s = localStorage.getItem("deets-skin");
          if (!s) {
            s = window.matchMedia("(max-width: 41rem)").matches
              ? "ocean" : "cyberstorm";
          }
          document.documentElement.setAttribute("data-skin", s);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../styles/main.css" />
    <script src="../js/controls.js" defer></script>
    <script src="../js/toast.js" defer></script>
    <script src="./movies.js" defer></script>
    <script src="../js/walkers.js" defer></script>
  </head>

  <body>
    <header class="site-header">
      <div class="site-brand">
        <a class="wordmark" href="/">Deets</a>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <div class="nav-group">
          <button type="button" class="nav-group__label" aria-haspopup="true">Blog<span class="nav-group__caret" aria-hidden="true">&#9662;</span></button>
          <div class="nav-group__menu" role="menu">
            <a href="/sotd/" role="menuitem" data-nav-core>SOTD</a>
            <a href="/movies/" role="menuitem" aria-current="page">Movies</a>
          </div>
        </div>
        <div class="nav-group">
          <button type="button" class="nav-group__label" aria-haspopup="true">Games<span class="nav-group__caret" aria-hidden="true">&#9662;</span></button>
          <div class="nav-group__menu" role="menu">
            <a href="/cities/" role="menuitem">DeetsCities</a>
          </div>
        </div>
        <div class="nav-group">
          <button type="button" class="nav-group__label" aria-haspopup="true">Utilities<span class="nav-group__caret" aria-hidden="true">&#9662;</span></button>
          <div class="nav-group__menu" role="menu">
            <a href="/radio/" role="menuitem">DeetsRadio</a>
            <a href="/league/" role="menuitem">League</a>
          </div>
        </div>
        <div class="nav-group">
          <button type="button" class="nav-group__label" aria-haspopup="true">About Me<span class="nav-group__caret" aria-hidden="true">&#9662;</span></button>
          <div class="nav-group__menu" role="menu">
            <a href="/cool-stuff/" role="menuitem" data-nav-core>Cool Stuff I Did</a>
            <a href="/resume/" role="menuitem">Resume</a>
          </div>
        </div>
      </nav>
      <span class="settings" data-settings></span>
    </header>

    <main class="site-main">
      <!-- Movie log — a Letterboxd export merged into movies.json by
           scripts/letterboxd_web.py. movies.js renders the grid below. -->
      <section class="sotd">
        <div class="sotd__bar">
          <h1 class="sotd__title">Movies</h1>
          <div class="sotd-toolbar" data-movies-toolbar aria-label="Sort and view"></div>
        </div>
        <p class="sotd__meta" data-movies-meta></p>
        <div class="sotd__grid sotd__grid--movies" data-movies-grid aria-live="polite"></div>
        <p class="movie__credit">
          Posters from <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a>.
          This site uses the TMDB API but is not endorsed or certified by TMDB.
        </p>
      </section>
    </main>
  </body>
</html>
